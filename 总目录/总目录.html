<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>总目录</title>
<style>
:root {
  --font-base: 16px;
  --sidebar-bg: #1c1e54;
  --sidebar-text: rgba(255,255,255,0.65);
  --sidebar-text-active: #ffffff;
  --bg: #ffffff;
  --border: #e5edf5;
  --text: #061b31;
  --text-secondary: #64748d;
  --accent: #533afd;
  --accent-light: rgba(83,58,253,0.06);
  --hover-bg: rgba(83,58,253,0.03);
  --shadow-sm: rgba(23,23,23,0.06) 0 3px 6px;
  --shadow-md: rgba(50,50,93,0.25) 0 30px 45px -30px, rgba(0,0,0,0.1) 0 18px 36px -18px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans SC', sans-serif; font-weight: 400; font-size: var(--font-base); background: var(--bg); color: var(--text); line-height: 1.6; display: flex; min-height: 100vh; -webkit-font-smoothing: antialiased; }
a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }

.sidebar { width: 240px; background: var(--sidebar-bg); padding: 1rem 0; position: fixed; top: 0; left: 0; height: 100vh; overflow-y: auto; z-index: 100; flex-shrink: 0; }
.sidebar-title { padding: 0 1.067rem 0.8rem; font-size: 0.933rem; font-weight: 500; color: var(--sidebar-text-active); border-bottom: 1px solid rgba(255,255,255,.08); margin-bottom: 0.4rem; letter-spacing: -.01em; }
.sidebar a { display: block; padding: 0.333rem 1.067rem; color: var(--sidebar-text); text-decoration: none; font-size: 0.867rem; font-weight: 300; transition: all .15s; cursor: pointer; border-left: 2px solid transparent; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.sidebar a:hover { color: var(--sidebar-text-active); background: rgba(255,255,255,.04); border-left-color: var(--accent); }
.sidebar .l1 { font-weight: 400; padding: 0.4rem 1.067rem; letter-spacing: -.01em; }
.sidebar .l2 { padding-left: 1.867rem; font-size: 0.8rem; }
.sidebar .l3 { padding-left: 2.667rem; font-size: 0.733rem; }
.side-count-badge { display: inline-block; padding: 0 0.267rem; border-radius: 999px; background: rgba(255,255,255,0.1); font-size: 0.6rem; margin-left: 0.267rem; opacity: 0.75; line-height: 1.4; pointer-events: none; }

.main { margin-left: 240px; flex: 1; padding: 1.333rem 1.6rem; max-width: 1200px; }
.header { margin-bottom: 1.067rem; }
.header h1 { font-size: 1.467rem; font-weight: 300; margin-bottom: 0.133rem; letter-spacing: -.03em; color: var(--text); }
.header .subtitle { color: var(--text-secondary); font-size: 0.933rem; font-weight: 300; }

.toolbar { display: flex; gap: 0.8rem; align-items: center; flex-wrap: wrap; position: sticky; top: 0; z-index: 50; background: var(--bg); padding: 0.533rem 0 0.8rem; margin-bottom: 1.067rem; }
.toolbar::after { content: ''; position: absolute; bottom: 0; left: -1.6rem; right: -1.6rem; height: 1px; background: var(--border); }
.toolbar input { flex: 1; min-width: 200px; padding: 0.533rem 0.8rem; border: 1px solid var(--border); border-radius: 4px; font-size: 0.933rem; font-weight: 300; outline: none; background: var(--card); transition: box-shadow .2s, border-color .2s; }
.toolbar input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(83,58,253,.12); }
.filter-btns { display: flex; gap: 0.4rem; flex-wrap: wrap; }
.filter-btn { padding: 0.4rem 0.933rem; border: 1px solid var(--border); border-radius: 4px; background: var(--card); cursor: pointer; font-size: 0.867rem; font-weight: 400; transition: all .15s; user-select: none; color: var(--text-secondary); }
.filter-btn:hover { border-color: var(--accent); color: var(--accent); }
.filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.flatten-toggle { display: flex; align-items: center; gap: 0.4rem; cursor: pointer; user-select: none; font-size: 0.8rem; color: var(--text-secondary); }
.flatten-toggle input { display: none; }
.flatten-toggle .slider { width: 2rem; height: 1.067rem; background: var(--accent); border-radius: 0.533rem; position: relative; transition: background .2s; flex-shrink: 0; }
.flatten-toggle .slider::after { content: ''; position: absolute; top: 0.133rem; left: 0.133rem; width: 0.8rem; height: 0.8rem; background: #fff; border-radius: 50%; transition: transform .2s; }
.flatten-toggle input:not(:checked) + .slider { background: #ccc; }
.flatten-toggle input:not(:checked) + .slider::after { transform: translateX(0.933rem); }
.flatten-desc { font-size: 0.733rem; color: var(--text-secondary); font-weight: 300; line-height: 1.5; margin-top: 0.267rem; }

/* Section */
.section { margin-bottom: 0.667rem; }
.section-header { display: flex; align-items: baseline; gap: 0.533rem; padding: 0.267rem 0 0; border-bottom: 1px solid var(--accent); position: sticky; top: var(--toolbar-height, 2.8rem); z-index: 40; background: var(--bg); will-change: position; }
.section-header h2 { font-size: 1.067rem; font-weight: 400; color: var(--text); letter-spacing: -.01em; }
.section-header .section-count { font-size: 0.867rem; color: var(--text-secondary); font-weight: 300; margin-left: auto; }

/* Group (chapter / sub-group) */
.group { margin: 0.067rem 0 0.067rem 0; }
.group-title { font-size: 0.933rem; font-weight: 400; color: var(--text); margin-bottom: 0; padding: 0 0 0.067rem; cursor: pointer; user-select: none; transition: color .15s; }
.group-title:hover { color: var(--accent); }
.group-title .chapter-label { color: var(--accent); font-weight: 500; margin-right: 0.133rem; }
.group-title .toggle-icon { display: inline-block; width: 1.2rem; text-align: center; font-size: 0.667rem; color: var(--text-secondary); margin-left: 0.267rem; transition: transform .2s; }
.group.collapsed > .group-children { display: none; }
.group-children { margin-left: 0.8rem; border-left: 1px solid var(--border); padding-left: 0.8rem; }

.sub-group { margin: 0 0 0.067rem 0; }
.sub-group-title { font-size: 0.867rem; font-weight: 400; color: var(--text); margin-bottom: 0; padding: 0 0 0.067rem; cursor: pointer; user-select: none; }
.sub-group-title:hover { color: var(--accent); }
.sub-group-title .toggle-icon { display: inline-block; width: 1rem; text-align: center; font-size: 0.6rem; color: var(--text-secondary); margin-left: 0.267rem; }
.sub-group.collapsed > .sub-group-children { display: none; }
.sub-group-children { margin-left: 0.8rem; }

/* Article card */
.article { display: flex; align-items: baseline; flex-wrap: wrap; gap: 0.133rem 2px; padding: 0.133rem 0.4rem; border-radius: 3px; transition: background .12s; }
.article:hover { background: var(--accent-light); }
.article-link { font-size: 0.933rem; font-weight: 400; color: var(--accent); word-break: break-word; }
.article-link:hover { text-decoration: underline; }
.article-date { font-size: 0.8rem; color: var(--text-secondary); white-space: nowrap; }
.article-tags { display: flex; gap: 0.267rem; flex-wrap: wrap; }
.article-tags .tag { display: inline-block; padding: 0.067rem 0.4rem; border-radius: 3px; font-size: 0.733rem; background: rgba(83,58,253,0.08); color: var(--accent); border: 1px solid rgba(83,58,253,0.12); line-height: 1.4; }
.section-tag { display: inline-block; padding: 0.067rem 0.4rem; border-radius: 3px; font-size: 0.733rem; background: rgba(0,150,136,0.08); color: #009688; border: 1px solid rgba(0,150,136,0.15); line-height: 1.4; }
.sec-num { display: inline-block; min-width: 2em; text-align: left; font-size: 0.8rem; color: var(--accent); font-weight: 400; font-variant-numeric: tabular-nums; opacity: 0.7; white-space: nowrap; }
.article-desc { flex: 0 0 100%; font-size: 0.8rem; color: var(--text-secondary); font-weight: 300; padding-left: 0.267rem; }

/* Sticky section nav */
.section-sticky-nav { position: sticky; top: 0; z-index: 40; padding: 0.133rem 0; margin-bottom: 0.333rem; }
.section-sticky-nav h2 { font-size: 1.467rem; font-weight: 400; }

/* Data warning */
.data-warning { background: #fff3cd; border: 1px solid #ffc107; border-left: 4px solid #ff9800; padding: 1.333rem 1.6rem; border-radius: 5px; margin-bottom: 2.133rem; font-size: 0.933rem; color: #6d4c00; display: none; line-height: 1.7; box-shadow: 0 2px 8px rgba(255,152,0,0.15); }
.data-warning p { margin: 0.267rem 0; }
.data-warning pre { background: #f0f0f0; padding: 0.4rem 0.667rem; border-radius: 4px; font-size: 0.8rem; overflow-x: auto; margin: 0.267rem 0 0.533rem; }
.data-warning code { background: #f0f0f0; padding: 0.067rem 0.267rem; border-radius: 3px; }
.data-warning-shown #content { opacity: 0.5; filter: grayscale(0.3); pointer-events: none; }
.default-data-banner { text-align: center; padding: 0.8rem 1.067rem; font-size: 0.867rem; color: #6d4c00; background: #fff3cd; border: 1px solid #ffc107; border-radius: 5px; margin-bottom: 1.067rem; }
.file-picker { margin-bottom: 0.8rem; padding: 0.533rem 1.067rem; font-size: 0.867rem; color: var(--text-secondary); display: none; }
.file-picker .picker-btn { margin-left: 0.4rem; padding: 0.267rem 0.667rem; border: 1px solid var(--border); border-radius: 4px; background: var(--card); cursor: pointer; font-size: 0.8rem; color: var(--text-secondary); transition: all .15s; }
.file-picker .picker-btn:hover { border-color: var(--accent); color: var(--accent); }

/* Rating filter */
.rating-filter { display: none; align-items: center; gap: 0.267rem; font-size: 0.8rem; color: var(--text-secondary); flex-wrap: nowrap; }
.rating-filter.show { display: flex; }
.rating-filter label { white-space: nowrap; flex-shrink: 0; }
.dual-range { position: relative; width: 7rem; height: 1.8rem; flex-shrink: 0; }
.dual-range input[type="range"] { display: none; }
.dual-range-track { position: absolute; top: 50%; left: 0; right: 0; height: 6px; background: #eef2f6; border-radius: 3px; transform: translateY(-50%); z-index: 1; pointer-events: none; }
.dual-range-fill { position: absolute; top: 50%; left: 0; right: 0; height: 6px; background: linear-gradient(90deg, var(--accent), #7c6aff); border-radius: 3px; transform: translateY(-50%); z-index: 2; pointer-events: none; }
.dual-range-thumb { position: absolute; top: 50%; width: 1.067rem; height: 1.067rem; border-radius: 50%; background: radial-gradient(circle at 35% 35%, #7c6aff, var(--accent)); border: 2px solid #fff; box-shadow: 0 2px 6px rgba(83,58,253,0.3); transform: translate(-50%, -50%); z-index: 3; cursor: grab; transition: box-shadow .15s; }
.dual-range-thumb:hover { box-shadow: 0 3px 10px rgba(83,58,253,0.4); }
.dual-range-thumb:active { cursor: grabbing; box-shadow: 0 4px 14px rgba(83,58,253,0.45); }
.range-indicator { position: absolute; top: -0.2rem; z-index: 5; pointer-events: none; font-size: 0.7rem; color: var(--text-secondary); font-variant-numeric: tabular-nums; font-weight: 500; letter-spacing: .02em; transform: translateX(-50%); }

/* No results */
.no-results { text-align: center; padding: 4rem 1.333rem; color: var(--text-secondary); }
.no-results h3 { font-size: 1.2rem; font-weight: 300; margin-bottom: 0.533rem; }

/* Highlight */
mark { background: #fff3b0; padding: 0; border-radius: 2px; }

/* Floating filter panel */
.filter-panel { position: fixed; right: 0; top: 50%; transform: translateY(-50%); z-index: 90; display: flex; flex-direction: row; align-items: stretch; }
.filter-panel-toggle { writing-mode: vertical-rl; padding: 0.667rem 0.333rem; border: none; background: var(--accent); color: #fff; cursor: pointer; font-size: 0.8rem; letter-spacing: 0.15em; border-radius: 0 4px 4px 0; transition: opacity .15s; line-height: 1.4; user-select: none; }
.filter-panel-toggle:hover { opacity: .85; }
.filter-panel-toggle::after { content: '◀'; display: block; writing-mode: horizontal-tb; margin-top: 0.4rem; font-size: 0.6rem; transition: transform .2s; }
.filter-panel.open .filter-panel-toggle { border-radius: 0; }
.filter-panel.open .filter-panel-toggle::after { transform: rotate(180deg); }
.filter-panel-content { display: none; background: var(--bg); border: 1px solid var(--border); border-right: none; border-radius: 4px 0 0 4px; padding: 0.4rem 0.533rem 0.533rem; max-height: 70vh; overflow-y: auto; box-shadow: var(--shadow-md); min-width: 7rem; }
.filter-panel.open .filter-panel-content { display: block; }
.filter-panel-header { font-size: 0.733rem; font-weight: 500; color: var(--text-secondary); padding: 0 0.533rem 0.333rem; border-bottom: 1px solid var(--border); margin-bottom: 0.267rem; }
.filter-panel-btn { display: block; width: 100%; padding: 0.267rem 0.533rem; border: none; background: transparent; cursor: pointer; font-size: 0.8rem; text-align: left; color: var(--text-secondary); border-radius: 3px; transition: all .1s; white-space: nowrap; }
.filter-panel-btn:hover { background: var(--accent-light); color: var(--accent); }
.filter-panel-btn.active { background: var(--accent); color: #fff; }
.filter-panel-btn + .filter-panel-btn { margin-top: 0.133rem; }

/* Rating badge */
.rating-badge { display: inline-flex; align-items: center; justify-content: center; width: 1.6em; height: 1.6em; border-radius: 50%; font-size: 0.667rem; font-weight: 500; color: #fff; margin-left: 0.4rem; cursor: default; flex-shrink: 0; position: relative; }
.rating-badge:hover::after { content: attr(data-tip); position: absolute; bottom: calc(100% + 4px); left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 0.267rem 0.533rem; border-radius: 4px; font-size: 0.733rem; white-space: nowrap; z-index: 10; line-height: 1.4; font-weight: 400; }
.rating-badge.green { background: #22c55e; }
.rating-badge.blue { background: #3b82f6; }
.rating-badge.yellow { background: #eab308; color: #333; }
.rating-badge.gray { background: #9ca3af; }

/* Responsive */
@media (max-width: 1200px) {
  :root { --font-base: 15px; }
  .sidebar { width: 240px; }
  .main { margin-left: 240px; }
}
@media (max-width: 1000px) {
  :root { --font-base: 14px; }
  .sidebar { width: 200px; }
  .main { margin-left: 200px; }
}
@media (max-width: 800px) {
  :root { --font-base: 13px; }
  .sidebar { width: 160px; }
  .main { margin-left: 160px; }
  .group-children { margin-left: 0.667rem; padding-left: 0.667rem; }
  .sub-group-children { margin-left: 0.667rem; }
}
@media (max-width: 600px) {
  :root { --font-base: 12px; }
  .sidebar { display: none; }
  .filter-panel { display: none; }
  .main { margin-left: 0; padding: 0.8rem 1.067rem; }
  .toolbar::after { left: -1.067rem; right: -1.067rem; }
  .group-children { margin-left: 0.4rem; padding-left: 0.4rem; border-left: none; }
}
@media (max-width: 480px) {
  .main { padding: 0.667rem 0.8rem; }
  .toolbar::after { left: -0.8rem; right: -0.8rem; }
}
</style>
</head>

<div class="sidebar" id="sidebar">
  <div class="sidebar-title">总目录</div>
</div>

<div class="main">
  <div class="header">
    <h1>总目录</h1>
    <div class="subtitle">共 <span id="total-articles">0</span> 篇文章</div>

    <input type="text" id="search" placeholder="搜索文章标题..." oninput="render()">
    <label class="flatten-toggle">
      <input type="checkbox" id="flatten-switch" checked onchange="toggleFlatten()">
      <span class="slider"></span>
      展平子分组

  <div id="data-warning" class="data-warning">
    <p><strong>⚠️ 数据文件加载失败</strong></p>
    <p><strong>如需本地查看：</strong>请在下方选择 <code>catalog_with_ratings.json</code> 文件</p>

    <button class="picker-btn" onclick="pickFile(true)">选择文件(显示所有的，仅供个人本地查看使用)</button>
    <input type="file" id="json-file" accept=".json" style="display:none" onchange="loadLocalFile(this)">
  </div>
  <div id="content"></div>
</div>

    <div class="filter-panel-header">分类筛选</div>
  </div>
  <button class="filter-panel-toggle" onclick="toggleFilterPanel()">分类</button>
</div>

<script>
const DEFAULT_DATA = {"catalog":[{"type":"AI","children":[{"title":"ChatGPT 注册及基础使用","date":"2023-03-10 18:01:45","url":"AI/ChatGPT/ChatGPT 注册及基础使用","secNum":"1"},{"title":"ChatGPT 串接到 Discord","date":"2023-03-10 18:02:45","url":"AI/ChatGPT/ChatGPT 串接到 Discord","secNum":"2"},{"title":"ComfyUI入门","date":"2024-09-27 09:54:01","url":"AI/ComfyUI入门","secNum":"2"}]},{"type":"Architecture架构","children":[{"type":"架构相关","children":[{"type":"1架构模式","children":[{"title":"架构模式-①概览","date":"2019-03-28 09:27:20","url":"Architecture架构/架构相关/1架构模式/架构模式-①概览","secNum":"1.1"},{"title":"架构模式-②MVC与MVVM","date":"2019-03-28 09:27:20","url":"Architecture架构/架构相关/1架构模式/架构模式-②MVC与MVVM","secNum":"1.2"},{"title":"架构模式-③组件化","date":"2021-11-24 23:10:17","url":"Architecture架构/架构相关/1架构模式/架构模式-③组件化","secNum":"1.3"}]}]}]},{"type":"管理相关","children":[{"title":"需求做不完，应该怎么办？(初/中级管理者篇)","date":"2019-04-20 17:05:41","url":"管理相关/进度管理/需求做不完，应该怎么办？(初:中级管理者篇)","secNum":"1"},{"title":"dvlproad 项目列表","date":"2026-04-25 00:00:00","url":"管理相关/项目列表/dvlproad项目列表","secNum":"1","htmlUrl":"管理相关/项目列表/dvlproad项目列表/dvlproad项目列表.html"},{"title":"高质量的项目","date":"2024-10-01 00:30:53","url":"管理相关/高质量的项目"}]},{"type":"隐藏示例","hidden":true,"children":[{"title":"AIGC入门","date":"2024-07-10 09:54:01","url":"AI/AIGC","secNum":"1"}]}]};

var appData = DEFAULT_DATA;
var currentFilter = [];
var flattenEnabled = true;
var showAll = false;
var openInNewTab = false;
var ratingMin = 0;
var ratingMax = 100;
var _activeThumb = null;

// ── Utility ──
function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function getType(item) {
  return item.type || item.title || '';
}

const ZH_NUMS = ['一','二','三','四','五','六','七','八','九','十','十一','十二','十三','十四','十五','十六','十七','十八','十九','二十'];
function getChapterLabel(index) {
  return '第' + (ZH_NUMS[index] || (index + 1)) + '章';
}

function stripExistingChapter(str) {
  return str.replace(/^第[一二三四五六七八九十]+章[：:]?\s*/, '');
}

function nodeMatchesSearch(node, query) {
  if (!query) return true;
  const q = query.toLowerCase();
  if (getType(node).toLowerCase().includes(q)) return true;
  if (node.url && node.url.toLowerCase().includes(q)) return true;
  if (node.tags && node.tags.some(t => t.toLowerCase().includes(q))) return true;
  if (node.description && node.description.toLowerCase().includes(q)) return true;
  return false;
}

function anyDescendantMatches(node, query) {
  if (nodeMatchesSearch(node, query)) return true;
  if (node.children) {
    for (const c of node.children) {
      if (anyDescendantMatches(c, query)) return true;
    }
  }
  return false;
}

function ratingMatch(item) {
  if (!showAll || item.rating == null) return true;
  return item.rating >= ratingMin && item.rating <= ratingMax;
}

function countArticles(items) {
  let c = 0;
  for (const item of items) {
    if (item.url && (!item.hideFromWeb || showAll) && ratingMatch(item)) c++;
    if (item.children) c += countArticles(item.children);
  }
  return c;
}

function hasVisibleContent(item) {
  if (item.url && (!item.hideFromWeb || showAll) && ratingMatch(item)) return true;
  if (item.children) return item.children.some(hasVisibleContent);
  return false;
}

// ── Sidebar ──
function buildSidebar(data) {
  const sb = document.getElementById('sidebar');
  sb.innerHTML = '<div class="sidebar-title">总目录</div>';
  for (const section of data.catalog) {
    if (section.hidden) continue;
    const cnt = countArticles([section]);
    if (cnt === 0) continue;
    const a = document.createElement('a');
    a.className = 'l1';
    a.textContent = section.type + ' (' + cnt + ')';
    a.href = '#section-' + encodeURIComponent(section.type);
    sb.appendChild(a);

    if (section.children) {
      for (const ch of section.children) {
        if (!ch.children) continue;
        const cc = countArticles([ch]);
        if (cc === 0) continue;
        const ca = document.createElement('a');
        ca.className = 'l2';
        ca.href = '#chapter-' + encodeURIComponent(section.type) + '-' + encodeURIComponent(ch.type);
        ca.innerHTML = escapeHtml(getType(ch)) + ' <span class="side-count-badge">' + cc + '</span>';
        sb.appendChild(ca);
      }
    }
  }
}

// ── Render ──
function render() {
  const q = document.getElementById('search').value.trim();
  const container = document.getElementById('content');
  const data = appData;

  if (!data || !data.catalog) {
    container.innerHTML = '<div class="no-results"><h3>暂无数据</h3></div>';
    return;
  }

  let html = '<div id="content-inner">';
  let totalCount = 0;

  for (const section of data.catalog) {
    if (section.hidden) continue;
    if (currentFilter.length > 0 && currentFilter.indexOf(section.type) < 0) continue;
    if (q && !anyDescendantMatches(section, q)) continue;

    const sectionCount = countArticles([section]);
    totalCount += sectionCount;
    if (sectionCount === 0) continue;

    html += '<div class="section" id="section-' + encodeURIComponent(section.type) + '">';
    html += '<div class="section-header">';
    html += '<h2>' + escapeHtml(section.type) + '</h2>';
    html += '<span class="section-count">' + sectionCount + ' 篇</span>';
    html += '</div>';
    if (section.children) {
      html += renderNodes(section.children, 0, q, section.type);
    }
    html += '</div>';
  }

  html += '</div>';

  if (html === '<div id="content-inner"></div>') {
    html = '<div class="no-results"><h3>没有匹配的文章</h3><p>试试其他搜索词或清除筛选</p></div>';
  }

  container.innerHTML = html;
  void container.offsetHeight; // force reflow for sticky recalculation
  adjustStickyTop();
  document.getElementById('total-articles').textContent = totalCount;

  if (q) highlightSearch(q);
}

function articleUrl(item) {
  var isLocalFile = location.protocol === 'file:';
  var prefix = isLocalFile ? '../' : '/';
  var path = item.htmlUrl || item.url + (isLocalFile ? '.md' : '');
  return prefix + path;
}

function flattenChapter(chapter) {
  var result = [];
  for (var i = 0; i < (chapter.children || []).length; i++) {
    var child = chapter.children[i];
    if (child.children) {
      extractTagged(child, child.type, result);
    } else {
      result.push(child);
    }
  }
  return result;
}

function extractTagged(item, tag, result) {
  if (item.children) {
    for (var i = 0; i < item.children.length; i++) {
      var child = item.children[i];
      if (child.children) {
        extractTagged(child, child.type, result);
      } else if (child.url) {
        result.push(Object.assign({}, child, { sectionTag: tag }));
      }
    }
  } else if (item.url) {
    result.push(Object.assign({}, item, { sectionTag: tag }));
  }
}

function toggleFlatten() {
  flattenEnabled = document.getElementById('flatten-switch').checked;
  var desc = document.getElementById('flatten-desc');
  desc.textContent = flattenEnabled ? '默认开启：章下的子分组（如 1架构模式）展平为文章，分组名显示为绿色标签。关闭后按目录层级分组显示。' : '已关闭：章下的子分组按目录层级显示为可折叠组。开启后子分组展平为文章，分组名显示为标签。';
  render();
}

function renderNodes(items, depth, query, sectionType) {
  let html = '';
  let chapterIdx = 0;

  for (const item of items) {
    if (query && !anyDescendantMatches(item, query)) continue;
    if (item.children && !item.children.some(hasVisibleContent)) continue;

    if (item.children && item.children.length > 0) {
      // Grouping node (chapter or sub-group)
      if (depth === 0) {
        // Top-level chapter: add numbering
        const raw = getType(item);
        const hasExisting = /^第[一二三四五六七八九十]+章[：:]?\s*/.test(raw);
        const label = hasExisting ? raw : getChapterLabel(chapterIdx) + '：' + raw;
        chapterIdx++;

        html += '<div class="group" id="chapter-' + encodeURIComponent(sectionType) + '-' + encodeURIComponent(raw) + '">';
        html += '<h3 class="group-title">';
        html += '<span class="toggle-icon" onclick="toggleGroup(this)">▼</span> ';
        if (item.url) {
html += '<a href="' + escapeHtml(articleUrl(item)) + '"' + (openInNewTab ? ' target="_blank"' : '') + '>' + escapeHtml(label) + '</a>';

        } else {
          html += '<span onclick="toggleGroup(this)">' + escapeHtml(label) + '</span>';
        }
        html += '</h3>';
        html += '<div class="group-children">';
        const chapterChildren = flattenEnabled ? flattenChapter(item) : item.children;
        html += renderNodes(chapterChildren, depth + 1, query, sectionType);
        html += '</div></div>';
      } else {
        // Sub-group: no numbering
        html += '<div class="sub-group">';
        html += '<h4 class="sub-group-title">';
        html += '<span class="toggle-icon" onclick="toggleSubGroup(this)">▼</span> ';
        if (item.url) {
          html += '<a href="' + escapeHtml(articleUrl(item)) + '"' + (openInNewTab ? ' target="_blank"' : '') + '>' + escapeHtml(getType(item)) + '</a>';
        } else {
          html += '<span onclick="toggleSubGroup(this)">' + escapeHtml(getType(item)) + '</span>';
        }
        html += '</h4>';
        html += '<div class="sub-group-children">';
        html += renderNodes(item.children, depth + 1, query, sectionType);
        html += '</div></div>';
      }
    } else if (item.url) {
      // Article
      if (item.hideFromWeb && !showAll) continue;
      if (showAll && item.rating != null && (item.rating < ratingMin || item.rating > ratingMax)) continue;
      html += renderArticle(item);
    }
  }

  return html;
}

function renderArticle(item) {
  const name = getType(item);
  const secNum = item.secNum || '';
  const dateStr = item.date ? item.date.slice(0, 10) : '';
  const updateStr = item.updated ? item.updated.slice(0, 10) : '';
  const tags = item.tags || [];
  const desc = item.description || '';
  const st = item.sectionTag || '';

  let html = '<div class="article">';
  html += '<span class="sec-num">' + (secNum ? escapeHtml(secNum) : '') + '</span>';
  html += '<a class="article-link" href="' + escapeHtml(articleUrl(item)) + '"' + (openInNewTab ? ' target="_blank"' : '') + '>' + escapeHtml(name) + '</a>';
  if (item.rating != null) {
    if (!showAll) { /* 评分仅显示所有的时可见 */ } else { var cls = item.rating >= 80 ? 'green' : item.rating >= 60 ? 'blue' : item.rating >= 40 ? 'yellow' : 'gray';
    var scores = item.scores || {};
    var tip = '评分 ' + item.rating + '\n深度 ' + scores.depth + ' 实用 ' + scores.practical + ' 完整 ' + scores.completeness + ' 原创 ' + scores.originality + ' 时效 ' + scores.timeliness + ' 代码 ' + scores.code_quality;
    html += '<span class="rating-badge ' + cls + '" data-tip="' + escapeHtml(tip) + '">' + Math.round(item.rating) + '</span>'; }
  }
  if (st) html += '<span class="section-tag">' + escapeHtml(st) + '</span>';
  if (dateStr) html += '<span class="article-date">发表于 ' + dateStr + '</span>';
  if (updateStr && updateStr !== dateStr) html += '<span class="article-date">更新于 ' + updateStr + '</span>';
  if (tags.length > 0) {
    html += '<span class="article-tags">';
    for (const tag of tags) {
      html += '<span class="tag">' + escapeHtml(tag) + '</span>';
    }
    html += '</span>';
  }
  if (desc) html += '<div class="article-desc">' + escapeHtml(desc) + '</div>';
  html += '</div>';
  return html;
}

function highlightSearch(q) {
  const terms = q.trim().split(/\s+/).filter(t => t);
  if (terms.length === 0) return;
  const escaped = terms.map(t => t.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'));
  const re = new RegExp('(' + escaped.join('|') + ')', 'gi');
  document.querySelectorAll('.article-link, .article-desc, .tag').forEach(el => {
    if (el.children.length === 0 && re.test(el.textContent)) {
      re.lastIndex = 0;
      const orig = el.innerHTML;
      el.innerHTML = orig.replace(re, '<mark>$1</mark>');
    }
  });
}

// ── Interactions ──
function toggleGroup(titleEl) {
  const children = titleEl.parentElement.querySelector('.group-children');
  if (!children) return;
  const icon = titleEl.querySelector('.toggle-icon');
  const isCollapsed = children.style.display === 'none';
  children.style.display = isCollapsed ? '' : 'none';
  if (icon) icon.textContent = isCollapsed ? '▼' : '▶';
}

function toggleSubGroup(titleEl) {
  const children = titleEl.parentElement.querySelector('.sub-group-children');
  if (!children) return;
  const icon = titleEl.querySelector('.toggle-icon');
  const isCollapsed = children.style.display === 'none';
  children.style.display = isCollapsed ? '' : 'none';
  if (icon) icon.textContent = isCollapsed ? '▼' : '▶';
}

function syncSlider() {
  var ind = document.getElementById('min-indicator');
  if (ind) { ind.textContent = ratingMin; ind.style.left = ratingMin + '%'; }
  var ind2 = document.getElementById('max-indicator');
  if (ind2) { ind2.textContent = ratingMax; ind2.style.left = ratingMax + '%'; }
  var fill = document.getElementById('range-fill');
  if (fill) { fill.style.left = ratingMin + '%'; fill.style.right = (100 - ratingMax) + '%'; }
  var mt = document.getElementById('min-thumb');
  if (mt) mt.style.left = ratingMin + '%';
  var mxt = document.getElementById('max-thumb');
  if (mxt) mxt.style.left = ratingMax + '%';
}

function valueFromEvent(e) {
  var rect = document.getElementById('rating-slider').getBoundingClientRect();
  var x = (e.clientX - rect.left) / rect.width;
  return Math.round(Math.max(0, Math.min(100, x * 100)));
}

(function initSlider() {
  var slider = document.getElementById('rating-slider');
  if (!slider) return;
  slider.addEventListener('mousedown', function(e) {
    var val = valueFromEvent(e);
    if (Math.abs(val - ratingMin) <= Math.abs(val - ratingMax)) {
      _activeThumb = 'min';
      ratingMin = Math.min(val, ratingMax);
    } else {
      _activeThumb = 'max';
      ratingMax = Math.max(val, ratingMin);
    }
    syncSlider();
    render();
    e.preventDefault();
  });
  slider.addEventListener('touchstart', function(e) {
    var t = e.touches[0];
    var val = valueFromEvent(t);
    if (Math.abs(val - ratingMin) <= Math.abs(val - ratingMax)) {
      _activeThumb = 'min';
      ratingMin = Math.min(val, ratingMax);
    } else {
      _activeThumb = 'max';
      ratingMax = Math.max(val, ratingMin);
    }
    syncSlider();
    render();
    e.preventDefault();
  });
  syncSlider();
})();

document.addEventListener('mousemove', function(e) {
  if (!_activeThumb) return;
  var val = valueFromEvent(e);
  if (_activeThumb === 'min') { ratingMin = Math.min(val, ratingMax); }
  else { ratingMax = Math.max(val, ratingMin); }
  syncSlider();
  render();
});

document.addEventListener('mouseup', function() { _activeThumb = null; });

document.addEventListener('touchmove', function(e) {
  if (!_activeThumb) return;
  var t = e.touches[0];
  var val = valueFromEvent(t);
  if (_activeThumb === 'min') { ratingMin = Math.min(val, ratingMax); }
  else { ratingMax = Math.max(val, ratingMin); }
  syncSlider();
  render();
});

document.addEventListener('touchend', function() { _activeThumb = null; });

function toggleFilterPanel() {
  document.getElementById('filter-panel').classList.toggle('open');
}

function setFilter(f) {
  if (f === 'all') {
    currentFilter = [];
    document.getElementById('filter-panel').classList.remove('open');
  } else {
    var idx = currentFilter.indexOf(f);
    if (idx >= 0) {
      currentFilter.splice(idx, 1);
    } else {
      currentFilter.push(f);
    }
    if (currentFilter.length > 0) {
      document.getElementById('filter-panel').classList.add('open');
    } else {
      document.getElementById('filter-panel').classList.remove('open');
    }
  }
  document.querySelectorAll('.filter-panel-btn').forEach(function(b) {
    if (b.dataset.filter === 'all') {
      b.classList.toggle('active', currentFilter.length === 0);
    } else {
      b.classList.toggle('active', currentFilter.indexOf(b.dataset.filter) >= 0);
    }
  });
  render();
}

function startApp(data, showAll) {
  showAll = showAll !== undefined ? showAll : false;
  var rf = document.getElementById('rating-filter');
  if (rf) rf.classList.toggle('show', showAll);
  if (!showAll) { ratingMin = 0; ratingMax = 100; }
  if (showAll) syncSlider();
  appData = data;
  // Populate floating filter panel (clear first to avoid duplicates on reload)
  var container = document.getElementById('filter-panel-content');
  container.innerHTML = '<div class="filter-panel-header">分类筛选</div>';
  var allBtn = document.createElement('button');
  allBtn.className = 'filter-panel-btn active';
  allBtn.dataset.filter = 'all';
  allBtn.textContent = '全部';
  allBtn.onclick = function() { setFilter('all'); };
  container.appendChild(allBtn);
  for (var i = 0; i < data.catalog.length; i++) {
    if (data.catalog[i].hidden) continue;
    var btn = document.createElement('button');
    btn.className = 'filter-panel-btn';
    btn.dataset.filter = data.catalog[i].type;
    btn.textContent = data.catalog[i].type;
    btn.onclick = function() { setFilter(this.dataset.filter); };
    container.appendChild(btn);
  }
  buildSidebar(data);
  render();
}

function pickFile(val) {
  showAll = val;
  document.getElementById('json-file').click();
  if (!showAll) { ratingMin = 0; ratingMax = 100; syncSlider(); }
  var rf = document.getElementById('rating-filter');
  if (rf) rf.classList.toggle('show', showAll);
  ratingMin = 0; ratingMax = 100; syncSlider();
}

function loadLocalFile(input) {
  var file = input.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var data = JSON.parse(e.target.result);
      document.getElementById('data-warning').style.display = 'none';
      document.getElementById('file-picker').style.display = 'none';
      document.getElementById('content').classList.remove('data-warning-shown');
      var banner = document.querySelector('.default-data-banner');
      if (banner) banner.remove();
      openInNewTab = true;
      startApp(data, showAll);
    } catch(e) {
      alert('JSON 格式错误，请选择有效的 catalog_with_ratings.json 文件');
    }
  };
  reader.readAsText(file);
}

function adjustStickyTop() {
  const toolbar = document.querySelector('.toolbar');
  if (!toolbar) return;
  document.documentElement.style.setProperty('--toolbar-height', toolbar.offsetHeight + 'px');
}

window.addEventListener('resize', adjustStickyTop);

async function init() {
  startApp(DEFAULT_DATA);             // Phase 0: 即时展示

  // Phase 1: fetch (HTTP)
  try {
    var resp = await fetch('./data/catalog_with_ratings.json');
    if (resp.ok) {
      startApp(await resp.json(), false);  // Phase 1: 显示仅可见（过滤 hideFromWeb）
      return;
    }
  } catch(e) {}

  // Phase 3: 提示 + 灰化 + 文件选择器
  document.getElementById('data-warning').style.display = 'block';
  document.getElementById('file-picker').style.display = 'block';
  document.getElementById('content').classList.add('data-warning-shown');
  var banner = document.createElement('div');
  banner.className = 'default-data-banner';
  banner.textContent = '⬇️ 以下为默认示例数据，请加载完整数据文件';
  document.getElementById('content').insertBefore(banner, document.getElementById('content').firstChild);
}

init();
</script>
